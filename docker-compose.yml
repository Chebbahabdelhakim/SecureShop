services:
  api-gateway:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - notification-service
      - inventory-service
    networks:
      - secureshop-net

  user-service:
    build: ./user-service
    expose:
      - "8001"
    networks:
      - secureshop-net

  product-service:
    build: ./product-service
    expose:
      - "8002"
    networks:
      - secureshop-net

  order-service:
    build: ./order-service
    expose:
      - "8003"
    networks:
      - secureshop-net

  payment-service:
    build: ./payment-service
    expose:
      - "8004"
    networks:
      - secureshop-net

  notification-service:
    build: ./notification-service
    expose:
      - "8005"
    networks:
      - secureshop-net

  inventory-service:
    build: ./inventory-service
    expose:
      - "8006"
    networks:
      - secureshop-net

networks:
  secureshop-net:
    driver: bridge
