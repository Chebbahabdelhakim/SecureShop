worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream user_upstream {
        server user-service:8001;
    }

    upstream product_upstream {
        server product-service:8002;
    }

    upstream order_upstream {
        server order-service:8003;
    }

    upstream payment_upstream {
        server payment-service:8004;
    }

    upstream notification_upstream {
        server notification-service:8005;
    }

    upstream inventory_upstream {
        server inventory-service:8006;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/users/ {
            proxy_pass http://user_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/users {
            return 301 /api/users/;
        }

        location /api/products/ {
            proxy_pass http://product_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/products {
            return 301 /api/products/;
        }

        location /api/orders/ {
            proxy_pass http://order_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/orders {
            return 301 /api/orders/;
        }

        location /api/payments/ {
            proxy_pass http://payment_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/payments {
            return 301 /api/payments/;
        }

        location /api/notifications/ {
            proxy_pass http://notification_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/notifications {
            return 301 /api/notifications/;
        }

        location /api/inventory/ {
            proxy_pass http://inventory_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/inventory {
            return 301 /api/inventory/;
        }

        location / {
            default_type text/plain;
            return 200 "SecureShop API Gateway. Use /api/users/, /api/products/, etc.\n";
        }
    }
}
